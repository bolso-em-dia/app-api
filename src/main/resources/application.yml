server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bolso_em_dia}
    username: ${DB_USERNAME:bolso_em_dia}
    password: ${DB_PASSWORD:bolso_em_dia}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        metadata_builder_contributor: com.mymoney.api.config.UnaccentContributor
        query.plan_cache_max_size: 128
        format_sql: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt-secret: ${APP_JWT_SECRET:change-this-secret-change-this-secret}
    access-token-minutes: ${APP_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${APP_REFRESH_TOKEN_DAYS:7}
    refresh-cookie-name: ${APP_REFRESH_COOKIE_NAME:bolso_em_dia_refresh_token}
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:4173,http://localhost:5173}
  admin:
    name: ${APP_ADMIN_NAME:Admin}
    email: ${APP_ADMIN_EMAIL:admin@bolso-em-dia.local}
    password: ${APP_ADMIN_PASSWORD:admin123456}
  exchange-rate:
    enabled: false
  version: "1.0.1"
