    refresh-cookie-name: bolso_em_dia_refresh_token
    allowed-origins:
      - http://localhost:4173
  admin:
    name: Admin
    email: admin@bolso-em-dia.local
    password: admin123456
  exchange-rate:
    enabled: false
  version: "1.0.22"
